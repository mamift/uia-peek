<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>ChromiumPeek</title>
	<style>
		body {
			margin: 0;
			padding: 10px;
			font-family: system-ui, sans-serif;
			font-size: 13px;
			min-width: 220px;
		}

		h1 {
			font-size: 14px;
			margin: 0 0 8px;
		}

		button {
			padding: 6px 10px;
